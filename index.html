<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>B2B Lead Scraper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    header { background: #1e293b; padding: 20px 40px; border-bottom: 1px solid #334155; }
    header h1 { font-size: 22px; color: #38bdf8; }
    header p { font-size: 13px; color: #94a3b8; margin-top: 4px; }
    .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .tab { padding: 10px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; border: none; transition: all 0.2s; }
    .tab.active { background: #38bdf8; color: #0f172a; }
    .tab:not(.active) { background: #1e293b; color: #94a3b8; }
    .panel { display: none; }
    .panel.active { display: block; }
    .card { background: #1e293b; border-radius: 12px; padding: 24px; border: 1px solid #334155; margin-bottom: 16px; }
    label { font-size: 13px; color: #94a3b8; display: block; margin-bottom: 6px; }
    input[type=text] { width: 100%; padding: 10px 14px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 14px; outline: none; }
    input[type=text]:focus { border-color: #38bdf8; }
    .row { display: flex; gap: 12px; margin-bottom: 12px; }
    .row input { flex: 1; }
    .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; }
    .btn-primary { background: #38bdf8; color: #0f172a; }
    .btn-primary:hover { background: #7dd3fc; }
    .btn-secondary { background: #334155; color: #e2e8f0; }
    .btn-secondary:hover { background: #475569; }
    .btn-danger { background: #ef4444; color: white; padding: 6px 12px; font-size: 12px; }
    .leads-list { margin-bottom: 16px; }
    .lead-item { display: flex; align-items: center; gap: 8px; background: #0f172a; border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; font-size: 13px; }
    .lead-item span { flex: 1; }
    .upload-area { border: 2px dashed #334155; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .upload-area:hover { border-color: #38bdf8; }
    .upload-area p { color: #94a3b8; font-size: 14px; margin-top: 8px; }
    .upload-area .icon { font-size: 32px; }
    input[type=file] { display: none; }
    .progress-wrap { margin-top: 24px; display: none; }
    .progress-bar-bg { background: #0f172a; border-radius: 99px; height: 8px; overflow: hidden; margin: 12px 0; }
    .progress-bar { height: 100%; background: #38bdf8; border-radius: 99px; transition: width 0.4s; width: 0%; }
    .status-text { font-size: 13px; color: #94a3b8; }
    .download-btn { display: none; width: 100%; margin-top: 16px; padding: 14px; font-size: 16px; background: #22c55e; color: white; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; }
    .download-btn:hover { background: #16a34a; }
    .csv-hint { font-size: 12px; color: #64748b; margin-top: 8px; }
  </style>
</head>
<body>

<header>
  <h1>🔍 B2B Lead Scraper</h1>
  <p>Enrichissement automatique de leads — SIREN · CEO · Téléphone · Confiance</p>
</header>

<div class="container">

  <div class="tabs">
    <button class="tab active" onclick="switchTab('manual')">✏️ Saisie manuelle</button>
    <button class="tab" onclick="switchTab('csv')">📂 Import CSV</button>
  </div>

  <!-- Manual Tab -->
  <div class="panel active" id="panel-manual">
    <div class="card">
      <label>Ajouter une entreprise</label>
      <div class="row">
        <input type="text" id="inp-name" placeholder="Nom de l'entreprise" />
        <input type="text" id="inp-city" placeholder="Ville (optionnel)" />
      </div>
      <button class="btn btn-secondary" onclick="addLead()">+ Ajouter</button>
    </div>

    <div class="leads-list" id="leads-list"></div>

    <button class="btn btn-primary" style="width:100%;padding:14px;font-size:15px;" onclick="startManual()">
      🚀 Lancer le scraping
    </button>
  </div>

  <!-- CSV Tab -->
  <div class="panel" id="panel-csv">
    <div class="card">
      <div class="upload-area" onclick="document.getElementById('csv-file').click()">
        <div class="icon">📄</div>
        <p><strong>Cliquez pour importer un fichier CSV</strong></p>
        <p>Colonnes requises : <code>name</code> et <code>city</code> (optionnel)</p>
      </div>
      <input type="file" id="csv-file" accept=".csv" onchange="handleCSV(this)" />
      <p class="csv-hint">Exemple CSV : name,city → "Kandbaz,Paris"</p>
    </div>
    <div id="csv-preview" style="margin-bottom:16px;"></div>
    <button class="btn btn-primary" style="width:100%;padding:14px;font-size:15px;" onclick="startCSV()">
      🚀 Lancer le scraping
    </button>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progress-wrap">
    <div class="card">
      <div class="status-text" id="status-text">Initialisation...</div>
      <div class="progress-bar-bg">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="status-text" id="status-detail"></div>
    </div>
    <button class="download-btn" id="download-btn" onclick="downloadFile()">
      ⬇️ Télécharger Excel
    </button>
  </div>

</div>

<script>
  let leads = [];
  let csvFile = null;
  let currentJobId = null;
  let pollInterval = null;

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'manual') || (i === 1 && tab === 'csv'));
    });
    document.getElementById('panel-manual').classList.toggle('active', tab === 'manual');
    document.getElementById('panel-csv').classList.toggle('active', tab === 'csv');
  }

  function addLead() {
    const name = document.getElementById('inp-name').value.trim();
    const city = document.getElementById('inp-city').value.trim();
    if (!name) return alert('Entrez un nom d\'entreprise.');
    leads.push({ name, city });
    renderLeads();
    document.getElementById('inp-name').value = '';
    document.getElementById('inp-city').value = '';
  }

  function removeLead(i) {
    leads.splice(i, 1);
    renderLeads();
  }

  function renderLeads() {
    const el = document.getElementById('leads-list');
    el.innerHTML = leads.map((l, i) => `
      <div class="lead-item">
        <span>🏢 <strong>${l.name}</strong>${l.city ? ' — ' + l.city : ''}</span>
        <button class="btn btn-danger" onclick="removeLead(${i})">✕</button>
      </div>
    `).join('');
  }

  function handleCSV(input) {
    csvFile = input.files[0];
    const reader = new FileReader();
    reader.onload = e => {
      const lines = e.target.result.split('\n').filter(l => l.trim()).slice(0, 6);
      document.getElementById('csv-preview').innerHTML = `
        <div class="card" style="font-size:13px;color:#94a3b8;">
          <strong style="color:#38bdf8;">Aperçu (${lines.length - 1} premières lignes)</strong><br><br>
          ${lines.map(l => `<div style="font-family:monospace;">${l}</div>`).join('')}
        </div>`;
    };
    reader.readAsText(csvFile);
  }

  async function startManual() {
    if (!leads.length) return alert('Ajoutez au moins une entreprise.');
    showProgress();
    const res = await fetch('/scrape', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ leads })
    });
    const data = await res.json();
    currentJobId = data.job_id;
    pollStatus();
  }

  async function startCSV() {
    if (!csvFile) return alert('Importez un fichier CSV.');
    showProgress();
    const formData = new FormData();
    formData.append('file', csvFile);
    const res = await fetch('/scrape-csv', { method: 'POST', body: formData });
    const data = await res.json();
    currentJobId = data.job_id;
    pollStatus();
  }

  function showProgress() {
    document.getElementById('progress-wrap').style.display = 'block';
    document.getElementById('download-btn').style.display = 'none';
    document.getElementById('progress-bar').style.width = '0%';
    document.getElementById('status-text').textContent = 'Démarrage...';
    document.getElementById('status-detail').textContent = '';
  }

  function pollStatus() {
    pollInterval = setInterval(async () => {
      const res = await fetch(`/status/${currentJobId}`);
      const job = await res.json();

      if (job.status === 'running') {
        document.getElementById('status-text').textContent = `⏳ Traitement en cours...`;
        document.getElementById('progress-bar').style.width = '60%';
      } else if (job.status === 'done') {
        clearInterval(pollInterval);
        document.getElementById('status-text').textContent = '✅ Scraping terminé !';
        document.getElementById('progress-bar').style.width = '100%';
        document.getElementById('download-btn').style.display = 'block';
      } else if (job.status === 'error') {
        clearInterval(pollInterval);
        document.getElementById('status-text').textContent = '❌ Erreur: ' + job.error;
      }
    }, 3000);
  }

  function downloadFile() {
    window.location.href = `/download/${currentJobId}`;
  }
</script>

</body>
</html>
